<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAM Seek - Site Bootloader</title>
    <style>
        :root {
            --bg-primary: #1e1e1e;
            --bg-secondary: #252526;
            --bg-tertiary: #2d2d30;
            --border-color: #3c3c3c;
            --accent: #8b5cf6;
            --text: #cccccc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: calc(100vh - 32px);
        }

        .main-area {
            flex: 1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #videoPlayer {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .grid-panel {
            width: 420px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .grid-header {
            padding: 8px 12px;
            background: var(--bg-tertiary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }

        .grid-container {
            flex: 1;
            overflow-y: auto;
            position: relative;
            background: var(--bg-primary);
        }

        .thumbnail-grid {
            display: grid;
            gap: 2px;
            background: var(--border-color);
        }

        .grid-cell {
            aspect-ratio: 16/9;
            background: var(--bg-tertiary);
            position: relative;
            overflow: hidden;
        }

        .grid-cell img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .grid-cell img.loaded {
            opacity: 1;
        }

        .cell-time {
            position: absolute;
            bottom: 2px;
            right: 4px;
            background: rgba(0, 0, 0, 0.7);
            padding: 2px 5px;
            font-size: 10px;
            border-radius: 3px;
        }

        .svg-marker {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 50;
            width: 30px;
            height: 30px;
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .loading-overlay.visible {
            display: flex;
        }

        .status-bar {
            height: 32px;
            background: var(--accent);
            display: flex;
            align-items: center;
            padding: 0 16px;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <div class="main-area">
            <video id="videoPlayer" controls crossorigin="anonymous"></video>
        </div>
        <div class="grid-panel">
            <div class="grid-header">
                <span>VAM SEEK VIEW</span>
                <select id="intervalSelect" style="background:#1e1e1e; color:white; border:none; font-size:11px;">
                    <option value="5">5s</option>
                    <option value="10" selected>10s</option>
                    <option value="30">30s</option>
                </select>
            </div>
            <div class="grid-container" id="gridContainer">
                <div id="thumbnailGrid" class="thumbnail-grid"></div>
                <div id="svgMarker" class="svg-marker">
                    <svg viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="40" fill="#e94560" stroke="#fff" stroke-width="8" />
                    </svg>
                </div>
                <div class="loading-overlay" id="loadingOverlay">Extracing Frames...</div>
            </div>
        </div>
    </div>
    <div class="status-bar">VAM Seek Bootloaded | Active Source</div>

    <script>
        const $ = id => document.getElementById(id);
        const player = $('videoPlayer');
        const grid = $('thumbnailGrid');
        const marker = $('svgMarker');

        let state = { gridWidth: 0, cellWidth: 0, cellHeight: 0, isDragging: false };

        async function init() {
            // Pick up the source from the Userscript injection
            const videoSrc = window.VAM_CONFIG?.src;
            if (!videoSrc) return alert("No video source found!");

            player.src = videoSrc;
            player.onloadedmetadata = () => renderGrid();

            $('intervalSelect').onchange = () => renderGrid();
        }

        async function renderGrid() {
            const interval = parseInt($('intervalSelect').value);
            const duration = player.duration;
            const total = Math.ceil(duration / interval);

            grid.style.gridTemplateColumns = `repeat(3, 1fr)`;
            grid.innerHTML = '';

            for (let i = 0; i < total; i++) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                cell.innerHTML = `<span class="cell-time">${Math.floor(i * interval)}s</span>`;
                grid.appendChild(cell);
            }

            requestAnimationFrame(async () => {
                const rect = grid.getBoundingClientRect();
                state.gridWidth = rect.width;
                const first = grid.children[0].getBoundingClientRect();
                state.cellWidth = first.width;
                state.cellHeight = first.height;
                await extract(videoSrc, interval, total);
            });
        }

        async function extract(src, interval, total) {
            const ex = document.createElement('video');
            ex.src = player.src;
            ex.crossOrigin = "anonymous";
            ex.muted = true;
            await new Promise(r => ex.onloadeddata = r);

            const canvas = document.createElement('canvas');
            canvas.width = 160; canvas.height = 90;
            const ctx = canvas.getContext('2d');

            for (let i = 0; i < total; i++) {
                ex.currentTime = i * interval;
                await new Promise(r => ex.onseeked = r);
                ctx.drawImage(ex, 0, 0, 160, 90);
                const img = new Image();
                img.src = canvas.toDataURL('image/jpeg', 0.7);
                img.onload = () => img.classList.add('loaded');
                grid.children[i].prepend(img);
            }
        }

        // Seek Logic
        grid.onmousedown = (e) => { state.isDragging = true; handle(e); };
        window.onmousemove = (e) => { if (state.isDragging) handle(e); };
        window.onmouseup = () => state.isDragging = false;

        function handle(e) {
            const r = grid.getBoundingClientRect();
            const x = Math.max(0, Math.min(e.clientX - r.left, r.width));
            const y = Math.max(0, Math.min(e.clientY - r.top, r.height));
            marker.style.transform = `translate(${x - 15}px, ${y - 15}px)`;

            const col = Math.floor(x / (state.cellWidth + 2));
            const row = Math.floor(y / (state.cellHeight + 2));
            const time = ((row * 3) + col + (x % state.cellWidth / state.cellWidth)) * parseInt($('intervalSelect').value);
            player.currentTime = time;
        }

        init();
    </script>
</body>

</html>
